services:
  api:
    build: .
    container_name: stock-predictor-api
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_URI=models:/lgbm@staging
      - MINIO_ENDPOINT=http://minio:9000
      - ROOT_USER=${ROOT_USER}
      - ROOT_PASSWORD=${ROOT_PASSWORD}
    depends_on:
      minio:
        condition: service_healthy
      mlflow:
        condition: service_started
    restart: unless-stopped
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${ROOT_USER}
      MINIO_ROOT_PASSWORD: ${ROOT_PASSWORD}
    volumes:
      - ./minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
  prefect:
    image: prefecthq/prefect:3-python3.12
    container_name: prefect-server
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - ./prefect_data:/root/.prefect
    restart: unless-stopped
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - AWS_ACCESS_KEY_ID=${ROOT_USER}
      - AWS_SECRET_ACCESS_KEY=${ROOT_PASSWORD}
      - MLFLOW_SERVER_ALLOWED_HOSTS=*
    volumes:
      - ./mlflow_data:/mlflow
    command: >
      mlflow server 
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --artifacts-destination s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
  minio-setup:
    image: minio/mc:latest
    container_name: minio-setup
    depends_on:
      minio:
        condition: service_healthy
    environment:
      ROOT_USER: ${ROOT_USER}
      ROOT_PASSWORD: ${ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${ROOT_USER} $${ROOT_PASSWORD};
      mc mb --ignore-existing local/mlflow-artifacts;
      exit 0;
      "